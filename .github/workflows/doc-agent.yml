name: Documentation Agent

# Runs on every push to main or develop that touches source files (excluding
# Markdown and Samples).  Can also be triggered manually via workflow_dispatch
# to regenerate all package READMEs from scratch.

on:
  push:
    branches: [main, develop]
    paths:
      - 'Source/HelixToolkit-Nex/**'
      - '!Source/HelixToolkit-Nex/**/*.md'
      - '!Source/HelixToolkit-Nex/Samples/**'
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Process all packages (still only updates changed/empty READMEs)'
        type: boolean
        default: false
      force_regenerate_all:
        description: 'Regenerate ALL package READMEs (ignores change detection)'
        type: boolean
        default: false
        
permissions:
  contents: write
  pull-requests: write
  models: read   # GitHub Models API access

jobs:
  doc-agent:
    runs-on: ubuntu-latest
    environment: DocGen
    steps:

      # ------------------------------------------------------------------ #
      # 1. Checkout with full history so we can inspect any commit range.   #
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------------------------------------------------------ #
      # 2. Python + openai SDK                                              #
      # ------------------------------------------------------------------ #
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install --quiet openai>=1.0.0

      # ------------------------------------------------------------------ #
      # 3. Run the documentation agent                                      #
      # ------------------------------------------------------------------ #
      - name: Run Documentation Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_ALL: ${{ inputs.force_all || 'false' }}
          FORCE_REGENERATE_ALL_READMES: ${{ inputs.force_regenerate_all || 'false' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # On a push event GitHub sets `github.event.before` to the SHA
          # that was the HEAD before the push.  The script uses this to
          # compute which packages changed.
          BEFORE_SHA: ${{ github.event.before }}
          DOC_AGENT_MODEL: gpt-4o
        run: python .github/scripts/doc_agent.py

      # ------------------------------------------------------------------ #
      # 4. Open a PR with the updated README files (only when changes exist) #
      # ------------------------------------------------------------------ #
      - name: Create Pull Request
        if: env.HAS_CHANGES == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: update README.md documentation for changed packages"
          title: "docs: Automated README.md documentation update"
          body: |
            ## Documentation Update

            This PR was automatically generated by the **Documentation Agent** after
            detecting source-code changes in one or more C# packages.

            ### Updated packages

            ${{ env.CHANGED_PACKAGES }}

            ---
            *Generated by the [Documentation Agent](.github/workflows/doc-agent.yml)
            — do not edit this PR description manually.*
          branch: docs/auto-update-${{ github.run_number }}
          base: ${{ github.ref_name }}
          labels: documentation
          delete-branch: true
